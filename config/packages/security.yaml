security:
    # 1. Hachage des mots de passe
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 2. Source des utilisateurs (Base de données via l'entité User)
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # 3. Les Pare-feux (Firewalls)
    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            # Configuration du formulaire de connexion
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true

            # Configuration de la déconnexion
            logout:
                path: app_logout

    # 4. Contrôle d'accès (Qui a le droit de voir quoi)
    access_control:
        # Pages publiques
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }

        # Pages protégées (Nécessitent d'être connecté)
        - { path: ^/client, roles: ROLE_USER }
        - { path: ^/project, roles: ROLE_USER }
        - { path: ^/contact, roles: ROLE_USER }

        # Administration (Si besoin plus tard)
        - { path: ^/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
