security:
    # 1. Hachage des mots de passe
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 2. Source des utilisateurs (Base de données via l'entité User)
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
        # used to reload user from session & other features (e.g. switch_user)

    role_hierarchy:
        ROLE_CLIENT: ROLE_USER
        ROLE_ADMIN: [ ROLE_CLIENT, ROLE_ALLOWED_TO_SWITCH ]

    # 3. Les Pare-feux (Firewalls)
    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            # 1. On indique à Symfony quel authentificateur utiliser en priorité
            entry_point: App\Security\AppAuthentificator

            # Ton authentificateur personnalisé (créé par make:auth)
            custom_authenticators:
                - App\Security\AppAuthentificator

            # Ton formulaire classique
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true

            logout:
                path: app_logout
            custom_authenticator: App\Security\AppAuthentificatorAuthenticator

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                # by default, the feature is enabled by checking a checkbox in the
                # login form, uncomment the following line to always enable it.
                #always_remember_me: true

    # 4. Contrôle d'accès (Qui a le droit de voir quoi)
    access_control:
        # Public
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }

        # Réservé au Freelance (ADMIN)
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/client/new, roles: ROLE_ADMIN }
        - { path: ^/client/\d+/edit, roles: ROLE_ADMIN } # Seul l'admin modifie

        # Ouvert aux Clients et au Freelance
        - { path: ^/project, roles: ROLE_CLIENT }
        - { path: ^/contact, roles: ROLE_CLIENT }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
